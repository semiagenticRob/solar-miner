# Xcel Energy Colorado residential rates
# Source: Xcel rate card screenshot, April 2026
# Robert is on Flat Rate (R-OO) as of Mar 2025

current_plan: flat_rate

flat_rate:
  name: "R-OO (Opt-out)"
  summer:  # Jun 1 - Sep 30
    all_day: 0.10380
  winter:  # Oct 1 - May 31
    all_day: 0.08570

time_of_use:
  name: "RE-TOU"
  summer:  # Jun 1 - Sep 30
    on_peak: 0.21277    # 5 PM - 9 PM, Mon-Fri
    off_peak: 0.07884   # All other times
  winter:  # Oct 1 - May 31
    on_peak: 0.18331    # 5 PM - 9 PM, Mon-Fri
    off_peak: 0.06792   # All other times

# Net metering: Xcel credits exported solar at the retail rate within the billing
# period. At annual true-up, excess credits paid at AHIC (wholesale, ~$0.02-0.04/kWh).
# Robert's post-solar data shows net grid draw every month (222-474 kWh),
# meaning he is always a net consumer — all export credits used at full retail.
# Therefore, every kWh diverted from export to mining has an opportunity cost
# equal to the retail rate.

# Mining revenue comparison (approximate, April 2026):
#   S19 mining revenue: ~$0.037/kWh at current hashprice
#   Flat rate summer:   $0.104/kWh (export credit value)
#   Flat rate winter:   $0.086/kWh (export credit value)
#   Gap: mining is ~$0.05-0.07/kWh less valuable than exporting in pure fiat terms
